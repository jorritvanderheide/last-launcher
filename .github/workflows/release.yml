name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    name: Build release APK
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          printf '%s\n' \
            "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" \
            "keyPassword=${{ secrets.KEY_PASSWORD }}" \
            "keyAlias=upload" \
            "storeFile=../upload-keystore.jks" \
            > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build APK (F-Droid)
        run: flutter build apk --release --dart-define=STORE=fdroid

      - name: Rename artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/last-launcher-fdroid.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/last-launcher-fdroid.apk
          generate_release_notes: true
